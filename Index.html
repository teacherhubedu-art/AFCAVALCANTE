<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AF Cavalcante Locação | Máquinas Pesadas com ou sem Operador</title>
  <meta name="description" content="Locação de máquinas pesadas com ou sem operador. Retroescavadeira, escavadeira, mini escavadeira, mini carregadeira e caminhões. Atendimento em Mogi das Cruzes, SP e região." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0a0a0a;
      --dark:    #111111;
      --yellow:  #F5C200;
      --yellow2: #FFDB4D;
      --gray-dk: #1e1e1e;
      --gray-md: #2e2e2e;
      --gray-lt: #6b6b6b;
      --gray-xlt:#b0b0b0;
      --white:   #ffffff;
      --off:     #f5f5f3;
      --radius:  6px;
      --shadow:  0 4px 24px rgba(0,0,0,.45);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--white);
      color: var(--dark);
      overflow-x: hidden;
    }

    img { max-width: 100%; display: block; }
    a   { text-decoration: none; color: inherit; }
    ul  { list-style: none; }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.05;
      letter-spacing: .02em;
    }

    .section-sub {
      font-size: 1.05rem;
      color: var(--gray-lt);
      max-width: 600px;
      line-height: 1.7;
      margin-top: 14px;
    }

    .badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 2px;
      margin-bottom: 14px;
    }

    /* BUTTONS */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--yellow);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-primary:hover { background: var(--yellow2); transform: translateY(-2px); }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 13px 28px;
      border-radius: var(--radius);
      border: 2px solid rgba(255,255,255,.45);
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .btn-outline:hover { border-color: var(--yellow); color: var(--yellow); }

    /* =============================================
       TOP BAR
    ============================================= */
    .topbar {
      background: var(--black);
      border-bottom: 1px solid #1f1f1f;
      padding: 8px 0;
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .topbar-link {
      color: var(--gray-xlt);
      font-size: .8rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .topbar-link:hover { color: var(--yellow); }
    .topbar-link svg { width: 13px; height: 13px; flex-shrink: 0; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .social-icon {
      color: var(--gray-xlt);
      display: flex;
      align-items: center;
      transition: color .2s;
    }
    .social-icon:hover { color: var(--yellow); }
    .social-icon svg { width: 16px; height: 16px; }

    /* =============================================
       NAVBAR
    ============================================= */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--dark);
      box-shadow: 0 2px 16px rgba(0,0,0,.5);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 24px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      background: var(--yellow);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { width: 26px; height: 26px; }
    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1.1;
      letter-spacing: .03em;
    }
    .logo-text span { color: var(--yellow); }
    .logo-sub {
      font-size: .65rem;
      font-weight: 400;
      color: var(--gray-xlt);
      text-transform: uppercase;
      letter-spacing: .1em;
      display: block;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .nav-link {
      color: var(--gray-xlt);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: .95rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 24px 16px;
      transition: color .2s;
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 16px;
      right: 16px;
      height: 3px;
      background: var(--yellow);
      transform: scaleX(0);
      transition: transform .2s;
    }
    .nav-link:hover { color: var(--white); }
    .nav-link:hover::after { transform: scaleX(1); }

    .nav-cta {
      margin-left: 12px;
    }

    /* Mobile toggle */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
    }
    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: all .3s;
    }

    /* =============================================
       HERO
    ============================================= */
    .hero {
      background: var(--black);
      min-height: 88vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* diagonal grid pattern */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,194,0,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,194,0,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* yellow diagonal accent */
    .hero::after {
      content: '';
      position: absolute;
      right: -100px;
      top: -60px;
      width: 55%;
      height: 120%;
      background: linear-gradient(135deg, #1a1600 0%, #2a2000 50%, transparent 75%);
      clip-path: polygon(18% 0%, 100% 0%, 100% 100%, 0% 100%);
      pointer-events: none;
    }

    .hero-bg-image {
      position: absolute;
      right: 0;
      top: 0;
      width: 55%;
      height: 100%;
      object-fit: cover;
      opacity: .18;
      mix-blend-mode: luminosity;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 80px 0;
      max-width: 640px;
    }
    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .hero-eyebrow-line {
      width: 36px;
      height: 3px;
      background: var(--yellow);
    }
    .hero-eyebrow-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: .15em;
    }

    .hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 900;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1.0;
      letter-spacing: .02em;
    }
    .hero-title .accent { color: var(--yellow); }

    .hero-desc {
      margin-top: 20px;
      color: var(--gray-xlt);
      font-size: 1.08rem;
      line-height: 1.7;
      max-width: 480px;
    }

    .hero-actions {
      margin-top: 36px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .hero-stats {
      margin-top: 60px;
      display: flex;
      gap: 36px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 36px;
    }
    .stat-item {}
    .stat-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
    }
    .stat-label {
      font-size: .82rem;
      color: var(--gray-xlt);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 4px;
    }

    /* =============================================
       BRAND STRIP
    ============================================= */
    .brand-strip {
      background: var(--yellow);
      padding: 16px 0;
      overflow: hidden;
    }
    .brand-strip-inner {
      display: flex;
      align-items: center;
      gap: 0;
      animation: marquee 28s linear infinite;
      width: max-content;
    }
    .brand-strip-item {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--black);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-strip-item::after {
      content: '◆';
      font-size: .5rem;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* =============================================
       EQUIPAMENTOS
    ============================================= */
    .equipamentos {
      padding: 100px 0;
      background: var(--off);
    }
    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }

    .equip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2px;
    }

    .equip-card {
      background: var(--dark);
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
      group: true;
    }
    .equip-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s;
      filter: grayscale(30%) brightness(.75);
    }
    .equip-card:hover .equip-card-img {
      transform: scale(1.07);
      filter: grayscale(0%) brightness(.6);
    }
    .equip-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 55%);
    }
    .equip-card-body {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
    }
    .equip-card-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 4px;
    }
    .equip-card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--white);
      text-transform: uppercase;
    }
    .equip-card-cta {
      margin-top: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .3s, transform .3s;
    }
    .equip-card:hover .equip-card-cta {
      opacity: 1;
      transform: translateY(0);
    }
    .equip-card-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--yellow);
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 3px;
    }

    /* Placeholder SVG machines */
    .machine-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gray-dk);
    }
    .machine-placeholder svg {
      width: 80px;
      height: 80px;
      opacity: .3;
    }

    /* =============================================
       SOBRE A EMPRESA
    ============================================= */
    .sobre {
      padding: 100px 0;
      background: var(--white);
    }
    .sobre-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .sobre-visual {
      position: relative;
    }
    .sobre-main-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 4px;
    }
    .sobre-accent-box {
      position: absolute;
      bottom: -28px;
      right: -28px;
      background: var(--yellow);
      padding: 24px 28px;
      border-radius: 4px;
      max-width: 200px;
    }
    .sobre-accent-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--black);
      line-height: 1;
    }
    .sobre-accent-label {
      font-size: .82rem;
      font-weight: 600;
      color: var(--black);
      margin-top: 4px;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .sobre-text .section-title { margin-bottom: 20px; }
    .sobre-text p {
      color: var(--gray-lt);
      line-height: 1.75;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    .sobre-checks {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sobre-check {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: .95rem;
    }
    .check-icon {
      width: 22px;
      height: 22px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .check-icon svg { width: 12px; height: 12px; }

    /* =============================================
       SERVIÇOS
    ============================================= */
    .servicos {
      padding: 100px 0;
      background: var(--dark);
    }
    .servicos .section-title,
    .servicos .section-sub { color: var(--white); }
    .servicos .section-sub { color: var(--gray-xlt); }
    .servicos-grid {
      margin-top: 56px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }
    .servico-card {
      background: var(--gray-dk);
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
      transition: background .2s;
    }
    .servico-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--yellow);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s;
    }
    .servico-card:hover { background: #252525; }
    .servico-card:hover::before { transform: scaleX(1); }
    .servico-icon {
      width: 52px;
      height: 52px;
      background: rgba(245,194,0,.12);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
    }
    .servico-icon svg { width: 26px; height: 26px; color: var(--yellow); }
    .servico-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .servico-desc {
      font-size: .92rem;
      color: var(--gray-xlt);
      line-height: 1.65;
    }

    /* =============================================
       DIFERENCIAIS
    ============================================= */
    .diferenciais {
      padding: 100px 0;
      background: var(--black);
      position: relative;
      overflow: hidden;
    }
    .diferenciais::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245,194,0,.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .diferenciais .section-title { color: var(--white); }
    .diferenciais .section-sub   { color: var(--gray-xlt); }
    .diferenciais-grid {
      margin-top: 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 32px;
    }
    .dif-item {
      text-align: center;
      padding: 32px 20px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px;
      transition: border-color .3s, background .3s;
    }
    .dif-item:hover {
      border-color: rgba(245,194,0,.3);
      background: rgba(245,194,0,.03);
    }
    .dif-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3.2rem;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
    }
    .dif-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--white);
      text-transform: uppercase;
      margin-top: 8px;
      letter-spacing: .05em;
    }
    .dif-text {
      font-size: .88rem;
      color: var(--gray-xlt);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* =============================================
       REGIÕES
    ============================================= */
    .regioes {
      padding: 100px 0;
      background: var(--off);
    }
    .regioes-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
    }
    .regioes-map {
      background: var(--dark);
      border-radius: 8px;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    .regioes-map svg {
      width: 100%;
      height: 100%;
      max-width: 380px;
      opacity: .85;
    }
    .regioes-list {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .regiao-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: var(--white);
      border-radius: 6px;
      font-weight: 600;
      font-size: .95rem;
      border-left: 3px solid var(--yellow);
    }
    .regiao-item svg { width: 16px; height: 16px; color: var(--yellow); }

    /* =============================================
       CTA BANNER
    ============================================= */
    .cta-banner {
      background: var(--yellow);
      padding: 80px 0;
    }
    .cta-banner-inner {
      display: flex;
